name: Leraningsteps ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: pip install -r ./api/requirements.txt
      
      - name: Lint with ruff
        run: ruff check ./api
        continue-on-error: true
      
      - name: Run pytest
        run: pytest ./api
      
      - name: Build Docker image
        run: docker build -t learning-steps:${{ github.sha }} ./api

